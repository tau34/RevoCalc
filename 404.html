<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>RevoIdle Calc</title>
    <script>
      // Redirect unknown paths to index with encoded route for SPA recovery.
      const segmentCount = 1
      const { l } = { l: window.location }
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
